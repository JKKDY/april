<svg width="300" height="300" viewBox="-110 -110 220 220" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="petalGradient" cx="50%" cy="70%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" style="stop-color:#ffe1fb;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ffb3cc;stop-opacity:1" />
        </radialGradient>

        <radialGradient id="centerGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ffccd9;stop-opacity:1" />
        </radialGradient>

        <path id="petalShape"
              d="M 0,0 C -5,-12 -28,-38 -28,-64 C -28,-89 -8,-106 0,-85 C 8,-106 28,-89 28,-64 C 28,-38 5,-12 0,0 Z" stroke="none"/>
    </defs>

    <g id="flower">
        <g fill="url(#petalGradient)">
            <use href="#petalShape" transform="rotate(0)" />
            <use href="#petalShape" transform="rotate(60)" />
            <use href="#petalShape" transform="rotate(120)" />
            <use href="#petalShape" transform="rotate(180)" />
            <use href="#petalShape" transform="rotate(240)" />
            <use href="#petalShape" transform="rotate(300)" />
        </g>

        <g stroke="#c92a54" stroke-width="5" fill="none" stroke-linejoin="round" stroke-linecap="round">
            <path d="M 0,0 C -5,-12 -28,-38 -28,-64 C -28,-89 -8,-106 0,-85 C 8,-106 28,-89 28,-64 C 28,-38 5,-12 0,0 Z" transform="rotate(0)"/>
            <path d="M 0,0 C -5,-12 -28,-38 -28,-64 C -28,-89 -8,-106 0,-85 C 8,-106 28,-89 28,-64 C 28,-38 5,-12 0,0 Z" transform="rotate(60)"/>
            <path d="M 0,0 C -5,-12 -28,-38 -28,-64 C -28,-89 -8,-106 0,-85 C 8,-106 28,-89 28,-64 C 28,-38 5,-12 0,0 Z" transform="rotate(120)"/>
            <path d="M 0,0 C -5,-12 -28,-38 -28,-64 C -28,-89 -8,-106 0,-85 C 8,-106 28,-89 28,-64 C 28,-38 5,-12 0,0 Z" transform="rotate(180)"/>
            <path d="M 0,0 C -5,-12 -28,-38 -28,-64 C -28,-89 -8,-106 0,-85 C 8,-106 28,-89 28,-64 C 28,-38 5,-12 0,0 Z" transform="rotate(240)"/>
            <path d="M 0,0 C -5,-12 -28,-38 -28,-64 C -28,-89 -8,-106 0,-85 C 8,-106 28,-89 28,-64 C 28,-38 5,-12 0,0 Z" transform="rotate(300)"/>
        </g>

        <polygon points="19,0 9.5,16.5 -9.5,16.5 -19,0 -9.5,-16.5 9.5,-16.5"
                 fill="url(#centerGradient)"
                 stroke="#c92a54"
                 stroke-width="4.5"
                 transform="rotate(30)" />

        <g stroke="#c92a54" stroke-width="2.5" stroke-linecap="round">
            <line x1="0" y1="-9.5" x2="0" y2="-32" transform="rotate(0)" />
            <line x1="0" y1="-9.5" x2="0" y2="-32" transform="rotate(60)" />
            <line x1="0" y1="-9.5" x2="0" y2="-32" transform="rotate(120)" />
            <line x1="0" y1="-9.5" x2="0" y2="-32" transform="rotate(180)" />
            <line x1="0" y1="-9.5" x2="0" y2="-32" transform="rotate(240)" />
            <line x1="0" y1="-9.5" x2="0" y2="-32" transform="rotate(300)" />
        </g>

        <g fill="#c92a54">
            <circle cx="0" cy="-36" r="4" transform="rotate(0)" />
            <circle cx="0" cy="-36" r="4" transform="rotate(60)" />
            <circle cx="0" cy="-36" r="4" transform="rotate(120)" />
            <circle cx="0" cy="-36" r="4" transform="rotate(180)" />
            <circle cx="0" cy="-36" r="4" transform="rotate(240)" />
            <circle cx="0" cy="-36" r="4" transform="rotate(300)" />
            <circle cx="0" cy="0" r="3" />
        </g>
    </g>
</svg>

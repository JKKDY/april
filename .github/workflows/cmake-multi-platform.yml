name: April CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:

jobs:
  build_and_test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          # -------------------------------------------
          #  RELEASE BUILDS (run on Linux, MacOS, MSVC)
          # -------------------------------------------
          - name: Linux (Clang 18, Release)
            os: ubuntu-24.04
            build_type: Release
            cxx: clang++-18
            cc: clang-18
            cmake_flags: ""

          - name: macOS (Apple Clang, Release)
            # macos-latest is currently macos-14 (ARM64 Apple Silicon)
            # This tests your xsimd NEON backend automatically.
            os: macos-latest
            build_type: Release
            cxx: clang++
            cc: clang
            cmake_flags: ""

          - name: macOS (Homebrew LLVM 18, Release)
            # Fallback for Mac users if Apple Clang fails on C++23
            os: macos-latest
            build_type: Release
            cxx: /opt/homebrew/opt/llvm@18/bin/clang++
            cc: /opt/homebrew/opt/llvm@18/bin/clang
            cmake_flags: ""

          - name: Windows (MSVC, Release)
            os: windows-latest
            build_type: Release
            cxx: cl
            cc: cl
            cmake_flags: ""

          - name: Windows (MinGW, Release)
            os: windows-latest
            build_type: Release
            cxx: g++
            cc: gcc
            cmake_flags: ""

          # -----------------------------------------
          # DEBUG BUILDS (Memory & Thread Sanitizers)
          # -----------------------------------------
          - name: Linux (Clang 18, ASAN + UBSAN)
            os: ubuntu-24.04
            build_type: Debug
            cxx: clang++-18
            cc: clang-18
            cmake_flags: "-DAPRIL_USE_ASAN=ON -DAPRIL_USE_UBSAN=ON"

          - name: Linux (GCC 14, TSAN)
            os: ubuntu-24.04
            build_type: Debug
            cxx: g++-14
            cc: gcc-14
            cmake_flags: "-DAPRIL_USE_TSAN=ON"

          # -----------------------------------------
          # NON DEFAULT BACKENDS (OpenMP & std::simd)
          # -----------------------------------------
          - name: Linux (GCC 14, std::simd + OpenMP)
            os: ubuntu-24.04
            build_type: Release
            cxx: g++-14
            cc: gcc-14
            cmake_flags: "-DAPRIL_ENABLE_XSIMD=OFF -DAPRIL_ENABLE_OPENMP=ON"

          - name: Windows (MSVC, OpenMP)
            os: windows-latest
            build_type: Release
            cxx: cl
            cc: cl
            cmake_flags: "-DAPRIL_ENABLE_OPENMP=ON"

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Compilers (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14 clang-18

      - name: Install Compilers (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run:
          brew install gcc@14
          brew install llvm@18

      - name: Set up MSVC Developer Command Prompt
        if: matrix.cxx == 'cl'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set Compiler Environment Variables
        shell: bash
        run: |
          echo "CC=${{ matrix.cc }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV

      - name: Configure CMake
        shell: bash
        run: cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ${{ matrix.cmake_flags }}

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ matrix.build_type }} -j 4

      - name: Run Tests
        shell: bash
        run: |
          cd build
          ctest --output-on-failure --build-config ${{ matrix.build_type }}


  coverage:
    name: Linux (Clang 18, Coverage)
    runs-on: ubuntu-24.04
    needs: build_and_test
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Clang 18
        shell: bash
        run: sudo apt-get install -y clang-18 llvm-18

      - name: Configure CMake (Coverage)
        shell: bash
        # Added Ninja here too for consistency and speed
        run: |
          cmake -G Ninja -S . -B build-coverage \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_C_COMPILER=clang-18 \
            -DAPRIL_ENABLE_COVERAGE=ON

      - name: Build
        shell: bash
        run: cmake --build build-coverage -j 4

      - name: Run Tests (Generate .profraw)
        shell: bash
        run: |
          export LLVM_PROFILE_FILE="$(pwd)/build-coverage/test_april-%p.profraw"
          cd build-coverage
          ctest --output-on-failure
          cd ..

      - name: Merge Profile Data
        shell: bash
        run: |
          llvm-profdata-18 merge -sparse \
            build-coverage/*.profraw -o build-coverage/coverage.profdata

      - name: Generate Coverage Report
        shell: bash
        run: |
          llvm-cov-18 export -format=lcov \
            "build-coverage/test/test_april" \
            -instr-profile=build-coverage/coverage.profdata \
            -ignore-filename-regex="test/|external/|build-coverage/" \
            > build-coverage/coverage.lcov

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build-coverage/coverage.lcov
          fail_ci_if_error: true
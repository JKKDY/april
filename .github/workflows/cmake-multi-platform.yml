name: April CI

on:
  push:
    branches: [ "main", "dev" ]

  pull_request:
    branches: [ "main", "dev" ]

  workflow_dispatch:

jobs:
  build_and_test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          # -------------------------------------------
          # RELEASE BUILDS
          # -------------------------------------------
          - name: Linux (Clang 18, Release)
            os: ubuntu-24.04
            build_type: Release
            cxx: clang++-18
            cc: clang-18
            cmake_flags: ""

          - name: macOS (Apple Clang, Release)
            # Tests the default out-of-the-box Mac experience and NEON SIMD
            os: macos-latest
            build_type: Release
            cxx: clang++
            cc: clang
            cmake_flags: "-DCMAKE_OSX_DEPLOYMENT_TARGET=14.0"

          - name: macOS (GCC 14, Release)
            # GCC 14 is paired with Xcode 16.4 and the macOS 15 SDK.
            # Newer macOS SDK headers are currently incompatible with GCC 14.
            os: macos-15
            build_type: Release
            cxx: g++-14
            cc: gcc-14
            cmake_flags: "-DCMAKE_OSX_DEPLOYMENT_TARGET=14.0"
            xcode_version: "16.4"

          - name: Windows (MSVC, Release)
            os: windows-latest
            build_type: Release
            cxx: cl
            cc: cl
            cmake_flags: ""

          - name: Windows (MinGW, Release)
            os: windows-latest
            build_type: Release
            cxx: g++
            cc: gcc
            cmake_flags: ""

          # -----------------------------------------
          # DEBUG BUILDS
          # -----------------------------------------
          - name: Linux (Clang 18, ASAN + UBSAN)
            os: ubuntu-24.04
            build_type: Debug
            cxx: clang++-18
            cc: clang-18
            cmake_flags: "-DAPRIL_USE_ASAN=ON -DAPRIL_USE_UBSAN=ON"

          - name: Linux (GCC 14, TSAN)
            os: ubuntu-24.04
            build_type: Debug
            cxx: g++-14
            cc: gcc-14
            cmake_flags: "-DAPRIL_USE_TSAN=ON"

          # -----------------------------------------
          # NON-DEFAULT BACKENDS
          # -----------------------------------------
          - name: Linux (GCC 14, std::simd + OpenMP)
            os: ubuntu-24.04
            build_type: Release
            cxx: g++-14
            cc: gcc-14
            cmake_flags: "-DAPRIL_ENABLE_XSIMD=OFF -DAPRIL_ENABLE_OPENMP=ON"

          - name: Windows (MSVC, OpenMP)
            os: windows-latest
            build_type: Release
            cxx: cl
            cc: cl
            cmake_flags: "-DAPRIL_ENABLE_OPENMP=ON"

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install compilers (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-14 \
            g++-14 \
            clang-18

      - name: Install GCC 14 (macOS)
        if: runner.os == 'macOS' && matrix.cxx == 'g++-14'
        shell: bash
        run: |
          if ! command -v g++-14 >/dev/null 2>&1; then
            brew install gcc@14
          fi

          g++-14 --version

      - name: Select macOS SDK for GCC
        if: runner.os == 'macOS' && matrix.cxx == 'g++-14'
        shell: bash
        run: |
          DEVELOPER_DIR="/Applications/Xcode_${{ matrix.xcode_version }}.app/Contents/Developer"

          if [[ ! -d "$DEVELOPER_DIR" ]]; then
            echo "Xcode developer directory not found: $DEVELOPER_DIR"
            exit 1
          fi

          SDKROOT="$(
            DEVELOPER_DIR="$DEVELOPER_DIR" \
              xcrun --sdk macosx --show-sdk-path
          )"

          echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> "$GITHUB_ENV"
          echo "SDKROOT=$SDKROOT" >> "$GITHUB_ENV"

          echo "Selected developer directory: $DEVELOPER_DIR"
          echo "Selected SDK: $SDKROOT"

      - name: Set up MSVC Developer Command Prompt
        if: matrix.cxx == 'cl'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        shell: bash
        run: |
          cmake_args=(
            -G Ninja
            -S .
            -B build
            "-DCMAKE_BUILD_TYPE=${{ matrix.build_type }}"
            "-DCMAKE_C_COMPILER=${{ matrix.cc }}"
            "-DCMAKE_CXX_COMPILER=${{ matrix.cxx }}"
            -DAPRIL_BUILD_EXAMPLES=ON
          )

          if [[ -n "${SDKROOT:-}" ]]; then
            cmake_args+=("-DCMAKE_OSX_SYSROOT=$SDKROOT")
          fi

          extra_flags="${{ matrix.cmake_flags }}"

          if [[ -n "$extra_flags" ]]; then
            read -ra parsed_flags <<< "$extra_flags"
            cmake_args+=("${parsed_flags[@]}")
          fi

          cmake "${cmake_args[@]}"

      - name: Build all targets
        shell: bash
        run: |
          cmake --build build \
            --config "${{ matrix.build_type }}" \
            -j 4

      - name: Run tests
        shell: bash
        run: |
          ctest \
            --test-dir build \
            --output-on-failure \
            --build-config "${{ matrix.build_type }}"

  coverage:
    name: Linux (Clang 18, Coverage)
    runs-on: ubuntu-24.04

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Clang 18
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-18 \
            llvm-18

      - name: Configure CMake
        shell: bash
        run: |
          cmake \
            -G Ninja \
            -S . \
            -B build-coverage \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DAPRIL_ENABLE_COVERAGE=ON

      - name: Build
        shell: bash
        run: |
          cmake --build build-coverage -j 4

      - name: Run tests
        shell: bash
        run: |
          export LLVM_PROFILE_FILE="$GITHUB_WORKSPACE/build-coverage/test_april-%p.profraw"

          ctest \
            --test-dir build-coverage \
            --output-on-failure

      - name: Merge profile data
        shell: bash
        run: |
          llvm-profdata-18 merge \
            -sparse \
            build-coverage/*.profraw \
            -o build-coverage/coverage.profdata

      - name: Generate coverage report
        shell: bash
        run: |
          llvm-cov-18 export \
            -format=lcov \
            build-coverage/test/test_april \
            -instr-profile=build-coverage/coverage.profdata \
            -ignore-filename-regex="test/|external/|build-coverage/" \
            > build-coverage/coverage.lcov

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build-coverage/coverage.lcov
          fail_ci_if_error: true